<!doctype html>
<html lang="en" style="background-color: var(--v2-background-bg-deep, #fafafa)">
<head>
  <meta charset="utf-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, interactive-widget=resizes-content, viewport-fit=cover"
  >
  <title>mu web</title>
  <link rel="stylesheet" href="/app.css">
</head>
<body>
  <div id="app" class="app" data-sidebar-open="false">
    <header class="titlebar">
      <div class="titlebar-menu-slot">
        <button
          id="sidebar-toggle"
          class="titlebar-icon"
          type="button"
          aria-label="Toggle menu"
          aria-expanded="false"
          aria-controls="sidebar"
        >
          <svg viewBox="0 0 16 16" aria-hidden="true">
            <path d="M2.5 4.5h11M2.5 8h11M2.5 11.5h11" fill="none" stroke="currentColor" stroke-linecap="round" stroke-width="1.25"/>
          </svg>
        </button>
      </div>
      <div class="titlebar-fill"></div>
    </header>

    <section class="shell">
      <main class="chat-view" aria-label="Conversation view">
        <div class="conversation-shell">
          <mu-conversation-view id="conversation-view" data-slot="empty-chat-view"></mu-conversation-view>
          <mu-composer id="composer"></mu-composer>
        </div>
      </main>

      <div id="sidebar-hitbox" class="sidebar-hitbox" aria-hidden="true"></div>
      <mu-sidebar id="sidebar" class="sidebar" aria-label="Left panel"></mu-sidebar>
    </section>
  </div>

  <mu-project-modal id="project-modal"></mu-project-modal>

  <script type="module" src="/app.js"></script>
</body>
</html>
